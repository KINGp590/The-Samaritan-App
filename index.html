    <script>
        var acc = document.getElementsByClassName("accordion");
        var i;

        for (i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var panel = this.nextElementSibling;
                if (panel.style.display === "block") {
                    panel.style.display = "none";
                } else {
                    panel.style.display = "block";
                }
            });
        }
    </script>
    <script>

// Teacher WhatsApp number
const teacherNumber = "254720878925";

// Auto-copy function
function copyToClipboard(text) {
    navigator.clipboard.writeText(text)
        .then(() => console.log("File path copied to clipboard"))
        .catch(err => console.error("Failed to copy text: ", err));
}

// Categories - you can add more here
const categories = [
    "Incident Report",
    "Missing Item",
    "Medical Issue",
    "Behavior Concern",
    "Assignment Submission",
    "Technical Issue",
    "Other"
];

// Populate category dropdown dynamically if needed
const categorySelects = document.querySelectorAll(".category-select");
categorySelects.forEach(select => {
    categories.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
    });
});

document.querySelectorAll("form").forEach(form => {
    form.addEventListener("submit", function(e){
        e.preventDefault();

        // Get selected category from dropdown or panel
        const category = this.querySelector(".category-select") 
                         ? this.querySelector(".category-select").value
                         : this.closest(".panel")?.previousElementSibling?.innerText || "General";

        const date = this.querySelector('input[type="date"]').value;
        const name = this.querySelector('#name').value;
        const contact = this.querySelector('#contact').value;
        const location = this.querySelector('#location').value;

        // File input
        const fileInput = this.querySelector('input[type="file"]');
        let filePath = fileInput && fileInput.files.length > 0 
                       ? fileInput.files[0].name 
                       : "No file attached";

        // Auto-copy file path
        if(filePath !== "No file attached") {
            copyToClipboard(filePath);
        }

        // WhatsApp message formatting
        let message = 
`📌 *SAMARITAN REPORT*

*Category:* ${category}
*Date:* ${date}
*Name:* ${name}
*Contact:* ${contact}
*Location:* ${location}

📎 Evidence: ${filePath}

Please check the attached evidence.`;

        // Encode message and open WhatsApp
        const url = `https://wa.me/${teacherNumber}?text=${encodeURIComponent(message)}`;
        window.open(url, "_blank");
    });
});


</script>
