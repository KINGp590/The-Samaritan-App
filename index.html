                var panel = this.nextElementSibling;
                if (panel.style.display === "block") {

                } else {
                    panel.style.display = "block";

 <script>
    const SUPABASE_URL = "https://zxpgbiwdnkhuebrupcuo.supabase.co";
const SUPABASE_KEY = "sb_publishable_kHMOJOWYiUBlxBPoo7yUcQ_HiCP6Wxn";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.addEventListener("DOMContentLoaded", () => {

  /* 1. RELIABLE ACCORDION SYSTEM */
  const acc = document.getElementsByClassName("accordion");

  for (let i = 0; i < acc.length; i++) {
    acc[i].addEventListener("click", function() {
      this.classList.toggle("active");
      const panel = this.nextElementSibling;
      
      // Better toggle logic: handles initial state correctly
      if (panel.style.maxHeight) {
        panel.style.maxHeight = null;
        panel.style.padding = "0 20px";
      } else {
        panel.style.maxHeight = panel.scrollHeight + "px";
        panel.style.padding = "20px";
      }
    });
  }

  /* 2. ENHANCED FORM SUBMISSION */
  const forms = document.querySelectorAll("form");

  forms.forEach(form => {
    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      // UI Feedback: Disable button to prevent double submissions
      const submitBtn = form.querySelector('button[type="submit"]');
      const originalBtnText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerText = "Uploading...";

      // Capture Values
      const name = form.querySelector('input[name="name"]').value;
      const contact = form.querySelector('input[name="contact"]').value;
      const location = form.querySelector('input[name="location"]').value;
      const date = form.querySelector('input[name="date"]').value;
      const fileInput = form.querySelector('input[name="evidence"]');
      const file = fileInput.files[0];

      // Get category name from the accordion button
      const category = form.closest('.panel').previousElementSibling.innerText;

      if (!file) {
        alert("Please upload evidence.");
        submitBtn.disabled = false;
        submitBtn.innerText = originalBtnText;
        return;
      }

      try {
        // A. Sanitize Filename (Remove special characters/spaces)
        const fileExt = file.name.split('.').pop();
        const cleanName = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        const fileName = `${cleanName}_${Date.now()}.${fileExt}`;

        // B. Upload to Storage
        const { data: storageData, error: storageError } = await supabaseClient
          .storage
          .from("student-files")
          .upload(fileName, file);

        if (storageError) throw storageError;

        // C. Insert into Database Table (IMPORTANT!)
        // This assumes you have a table named 'reports'
        const { error: dbError } = await supabaseClient
          .from("reports")
          .insert([{
            reporter_name: name,
            contact_info: contact,
            incident_location: location,
            incident_date: date,
            category: category,
            evidence_url: storageData.path
          }]);

        if (dbError) throw dbError;

        alert("Report submitted successfully!");
        form.reset();
        
        // Collapse panel after success
        const panel = form.closest('.panel');
        panel.style.maxHeight = null;
        panel.previousElementSibling.classList.remove("active");

      } catch(err) {
        console.error("Submission Error:", err);
        alert(`Error: ${err.message || "Unexpected error occurred."}`);
      } finally {
        // Reset button state
        submitBtn.disabled = false;
        submitBtn.innerText = originalBtnText;
      }
    });
  });
});

</script>
