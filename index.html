    <script>
        var acc = document.getElementsByClassName("accordion");
        var i;

        for (i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var panel = this.nextElementSibling;
                if (panel.style.display === "block") {
                    panel.style.display = "none";
                } else {
                    panel.style.display = "block";
                }
            });
        }
    </script>
    <script>

const teacherNumber = "254787892960";

document.querySelectorAll("form").forEach(form => {

form.addEventListener("submit", function(e){

e.preventDefault();

let category =
this.closest(".panel").previousElementSibling.innerText;

let mainCategory =
this.closest(".panel").parentElement.previousElementSibling.innerText;

let date = this.querySelector('input[type="date"]').value;
let name = this.querySelector('#name').value;
let contact = this.querySelector('#contact').value;
let location = this.querySelector('#location').value;
let evidence = this.querySelector('#evidence').files.length;

let evidenceNote = evidence > 0
? "Evidence selected. Please attach it in WhatsApp"
: "No evidence selected.";

let message =
`SAMARITAN REPORT

Main Category: ${mainCategory}
Sub Category: ${category}

Date: ${date}
Name: ${name}
Contact: ${contact}
Location: ${location}

${evidenceNote}`;

let url =
`https://wa.me/${teacherNumber}?text=${encodeURIComponent(message)}`;

window.open(url, "_blank");

});

});

</script>
