    <script>
        var acc = document.getElementsByClassName("accordion");
        var i;

        for (i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var panel = this.nextElementSibling;
                if (panel.style.display === "block") {
                    panel.style.display = "none";
                } else {
                    panel.style.display = "block";
                }
            });
        }
    </script>
    <script>

<script>
const API_URL = "https://saints-rain-late-hawk.trycloudflare.com"; // Your Node server

document.querySelectorAll("form").forEach(form => {

    form.addEventListener("submit", async function(e){
        e.preventDefault();

        const formData = new FormData();

        // Get category based on accordion
        const category = this.closest(".panel")?.previousElementSibling?.innerText || "General";

        const date = this.querySelector('input[type="date"]').value;
        const name = this.querySelector('#name').value;
        const contact = this.querySelector('#contact').value;
        const location = this.querySelector('#location').value;

        // Combine all details into a WhatsApp text message
        const text = `Category: ${category}\nDate: ${date}\nName: ${name}\nContact: ${contact}\nLocation: ${location}`;

        formData.append("text", text);

        // Attach file if selected
        const fileInput = this.querySelector('input[type="file"]');
        if(fileInput.files.length > 0){
            formData.append("file", fileInput.files[0]); // Must be "file" to match server
        }

        try{
            const response = await fetch(API_URL, {
                method: "POST",
                body: formData
            });

            const result = await response.text();
            alert(result);

            // Reset form after successful submission
            form.reset();

        }catch(error){
            console.error(error);
            alert("Submission failed!");
        }
    });

});
